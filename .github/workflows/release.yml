name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      id-token: write
      contents: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Build Executable
        run: |
          powershell .\build_exe.ps1
          powershell .\package_portable.ps1
          powershell .\build_exe.ps1 -OneFile
          mkdir release_assets
          copy dist\WatermarkStudio.exe release_assets\
          copy release\WatermarkStudio_Portable.zip release_assets\

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'release_assets/*'

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release_assets/*
          generate_release_notes: true
